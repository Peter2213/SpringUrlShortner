<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortened - URL Shortener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #27ae60;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .success-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }

        .result-section {
            margin-bottom: 30px;
        }

        .result-section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .result-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 12px;
        }

        .result-label {
            color: #666;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .result-value {
            color: #333;
            word-break: break-all;
            font-size: 14px;
        }

        .short-url-box {
            background: #e8f5e9;
            border: 2px solid #27ae60;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 12px;
        }

        .short-url-box .result-value {
            color: #27ae60;
            font-weight: 600;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 10px;
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #95a5a6;
        }

        .btn-secondary:hover {
            box-shadow: 0 5px 20px rgba(149, 165, 166, 0.4);
        }

        .copy-btn {
            background: #27ae60;
            display: inline-block;
            width: auto;
            padding: 8px 12px;
            font-size: 12px;
            margin-top: 10px;
        }

        .copy-btn:hover {
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        a {
            color: #667eea;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✨</div>
        <h1>Success!</h1>
        <p class="subtitle">Your URL has been shortened</p>

        <div class="result-section">
            <div class="short-url-box">
                <div class="result-label">Your Short URL</div>
                <div class="result-value" id="shortUrl" th:text="${response.shortUrl}"></div>
                <button type="button" class="copy-btn" onclick="copyToClipboard(this)">Copy Link</button>
            </div>

            <div class="result-item">
                <div class="result-label">Short Code</div>
                <div class="result-value" th:text="${response.shortCode}"></div>
            </div>

            <div class="result-item">
                <div class="result-label">Original URL</div>
                <div class="result-value" th:text="${response.originalUrl}"></div>
            </div>

            <div class="result-item">
                <div class="result-label">Created At</div>
                <div class="result-value" th:text="${#temporals.format(response.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></div>
            </div>

            <div th:if="${response.expiresAt}" class="result-item">
                <div class="result-label">Expires At</div>
                <div class="result-value" th:text="${#temporals.format(response.expiresAt, 'yyyy-MM-dd HH:mm:ss')}"></div>
            </div>
        </div>

        <button type="button" onclick="window.location.href='/'">Shorten Another URL</button>
        <button type="button" class="btn-secondary" onclick="goToShortUrl()">Visit Short URL</button>
    </div>

    <script>
        function copyToClipboard(btn) {
            const text = document.getElementById('shortUrl').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = 'Copied! ✓';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                alert('Failed to copy: ' + err);
            });
        }

        function goToShortUrl() {
            const shortUrl = document.getElementById('shortUrl').textContent;
            window.location.href = shortUrl;
        }
    </script>
</body>
</html>
